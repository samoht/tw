# Modules included in tw.ml intentionally expose prefixed DSL names at the
# top-level Tw namespace.
# Utility parsers are intentionally expressed as large Tailwind class matchers.
max-complexity = 43
max-nesting = 9

allowed_words = [
  "base_to_style",
  "bracket_color_to_custom",
  "candidates_from_file",
  "color_to_string",
  "config_to_string",
  "container_query_to_condition",
  "css_color_to_hex",
  "custom_color_to_oklab",
  "dedup_keyframes_to_css",
  "extract_breakpoints_from_css",
  "extract_radius_from_css",
  "extract_spacing_from_css",
  "filter_theme_from_statements",
  "hex_to_rgb",
  "indexed_rule_to_statement",
  "margin_to_length",
  "oklch_to_css",
  "oklch_to_rgb",
  "opacity_to_percent",
  "rgb_to_hex",
  "rgb_to_oklab",
  "rgb_to_oklch",
  "rule_to_triple",
  "set_var_names_from_props",
  "test_modifier_to_rule",
  "test_rgb_to_hex",
  "test_to_tw",
  "to_class",
  "to_classes",
  "to_color",
  "to_css",
  "to_name",
]

# The local checkout uses an untracked symlink to the sibling cascade repo for
# development. It is not part of this package's lint surface.
[[rules]]
files = "cascade/**"
exclude = ["*"]

[[rules]]
files = "./cascade/**"
exclude = ["*"]

